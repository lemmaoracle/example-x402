[profile.default]
src = "build"
out = "out"
libs = ["lib", "node_modules", "../contracts/lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "prague"
ffi = false
ast = true
build_info = true

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base = "${BASE_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
mainnet = { key = "${ETHERSCAN_API_KEY}", chain = 1 }
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532, url = "https://api-sepolia.basescan.org/api" }
base = { key = "${ETHERSCAN_API_KEY}", chain = 8453, url = "https://api.basescan.org/api" }