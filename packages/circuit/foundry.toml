[profile.default]
src = "build"
out = "out"
libs = ["lib", "node_modules", "../contracts/lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "prague"
ffi = false
ast = true
build_info = true

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"
monad_testnet = "${MONAD_TESTNET_RPC_URL}"
base_sepolia = "https://sepolia.base.org"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
mainnet = { key = "${ETHERSCAN_API_KEY}", chain = 1 }
monad_testnet = { key = "${ETHERSCAN_API_KEY}", chain = 10143, url = "https://testnet.monadexplorer.com/api" }
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532 }