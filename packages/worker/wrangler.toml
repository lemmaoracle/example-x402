name = "lemma-query"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8787

[vars]
LEMMA_API_BASE = "https://workers.lemma.workers.dev"
FACILITATOR_URL = "https://x402-facilitator.lemma.workers.dev"
PAY_TO_ADDRESS = "0x000000000000000000000000000000000000dEaD"  # Demo: burn address
# DEMO_MODE is not set by default — real x402 payment flow is enabled.
# To run locally without wallet setup, set DEMO_MODE=true in .dev.vars

# Secrets (set via `npx wrangler secret put`):
#   LEMMA_API_KEY   — Lemma API key (if required)
#
# For production, unset DEMO_MODE and configure PAY_TO_ADDRESS to your wallet.
