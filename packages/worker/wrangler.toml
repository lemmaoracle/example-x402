name = "lemma-query"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8787

[vars]
LEMMA_API_BASE = "https://workers.lemma.workers.dev"
# LEMMA_API_KEY is set as an encrypted Cloudflare Workers secret, not in vars.
#   wrangler secret put LEMMA_API_KEY --cwd packages/worker
# For local dev, put it in packages/worker/.dev.vars (gitignored).
# The demo path works without a key, but is rate-limited.
FACILITATOR_URL = "https://api.cdp.coinbase.com/platform/v2/x402"
LEMMA_RELAY_URL = "https://p01--lemma-relay-api--svxwx5rc5jzx.code.run/"
PAY_TO_ADDRESS = "0x000000000000000000000000000000000000dEaD"
LEMMA_DISCOVERY_CONFIG = "{\"schemas\":[\"blog-article\"],\"hints\":{\"verifiable\":[\"author\",\"published\",\"integrity\",\"words\",\"lang\"]},\"routes\":{\"GET /example/verify/:hash\":{\"schemas\":[\"blog-article\"],\"hints\":{\"circuitId\":\"x402-payment-v1\",\"verifiable\":[\"author\",\"published\",\"integrity\",\"words\",\"lang\"]}},\"POST /example/query\":{\"schemas\":[\"blog-article\"],\"hints\":{\"circuitId\":\"blog-article-v1\",\"attributes\":[\"author\",\"published\",\"words\",\"lang\",\"integrity\"],\"authors\":[\"did:example:alice\",\"did:example:bob\",\"did:example:charlie\"],\"freshness\":\"2026-04-08\",\"langs\":[\"en\",\"ja\"],\"count\":3}}}}"
