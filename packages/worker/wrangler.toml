name = "lemma-query"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
LEMMA_API_BASE = "https://workers.lemma.workers.dev"
FACILITATOR_URL = "https://example.com/x402-facilitator"

# Secrets (set via `npx wrangler secret put`):
#   PAY_TO_ADDRESS  — wallet address to receive x402 payments
#   LEMMA_API_KEY   — Lemma API key (if required)
