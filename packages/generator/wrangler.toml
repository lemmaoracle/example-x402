name = "lemma-generator"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
LEMMA_API_BASE = "https://api.lemmaoracle.com"
CIRCUIT_ID = "blog-article-v1"
SCHEMA_ID = "blog-article"

# Secrets (set via `wrangler secret put`):
#   LEMMA_API_KEY   — Lemma API key for document registration
#   ISSUER_ID       — Issuer DID for registered documents
